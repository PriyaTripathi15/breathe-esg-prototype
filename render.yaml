services:
  - type: web
    name: breathe-esg-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn breathe_esg.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  - type: static
    name: breathe-esg-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://breathe-esg-api.onrender.com/api

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
